<!DOCTYPE html>
<html lang="en">
{% include head.html %}
<body>
    {% include header.html %}

    <main class="portfolio-item-container">
        <!-- Introduction Section -->
        <section class="intro">
            <h1 class="section__title section__title--intro">
                Project <strong>{{ page.title }}</strong>
            </h1>
            <p class="section__subtitle section__subtitle--intro">3D Graphics Demo</p>
            {% if page.thumbnail %}
            <img src="{{ page.thumbnail | relative_url }}" alt="Thumbnail" class="intro__img">
            {% endif %}
        </section>

        <div class="portfolio-item-individual">
            <h2>Project Overview</h2>
            <p>{{ page.description }}</p>

            <h2>Tasks Completed</h2>
            <ul>
                {% for task in page.tasks %}
                <li>{{ task }}</li>
                {% endfor %}
            </ul>
        </div>

        <div class="portfolio-item-individual">
            <h2>Demo</h2>
            <iframe id="demo" src="{{ page.demo_url }}" tabindex="-1" style="width:100%; height:600px; border:none;"></iframe>
        </div>
    </main>

    {% include footer.html %}
    <script src="{{ '/assets/js/index.js' | relative_url }}"></script>
</body>
</html>
